<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Loan Management</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
        }

        /* Layout */
        .container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: #2f3e4e;
            color: white;
            padding-top: 20px;
        }

        .menu {
            padding: 15px 25px;
            cursor: pointer;
        }

        .menu:hover {
            background: #3f5163;
        }

        .active {
            background: #3f5163;
        }

        /* Main */
        .main {
            flex: 1;
            padding: 40px;
        }

        /* Header */
        .header {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        /* Filters Section */
        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        input,
        select {
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            min-width: 180px;
        }

        input:focus,
        select:focus {
            border-color: #3498db;
            outline: none;
        }

        /* Table */
        .table-container {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #3498db;
            color: white;
            padding: 15px;
            text-align: left;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid #ddd;
        }

        /* Status Badges */
        .badge {
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            color: white;
        }

        .approved {
            background: #27ae60;
        }

        .pending {
            background: #f39c12;
        }

        .rejected {
            background: #e74c3c;
        }

        /* Action Buttons */
        .btn {
            padding: 6px 10px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }

        .approve {
            background: #27ae60;
        }

        .reject {
            background: #e74c3c;
        }

        .btn:hover {
            opacity: 0.85;
        }

        /* Pagination */
        .pagination {
            padding: 15px;
            text-align: right;
        }

        .pagination span {
            margin: 0 5px;
            cursor: pointer;
        }

        .pagination span:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="menu">Dashboard</div>
            <div class="menu active">Loan Requests</div>
            <div class="menu">Users</div>
            <div class="menu">Approvals</div>
            <div class="menu">Disbursement</div>
            <div class="menu">Reports</div>
        </div>

        <!-- Main -->
        <div class="main">

            <div class="header">Admin Panel - Loan Management</div>

            <!-- Filters -->
            <div class="filters">
                <input type="text" placeholder="Search...">
                <select>
                    <option>Status</option>
                    <option>Approved</option>
                    <option>Pending</option>
                    <option>Rejected</option>
                </select>
                <input type="date">
            </div>

            <!-- Table -->
            <div class="table-container">

                <table>
                    <tr>
                        <th>User Name</th>
                        <th>Loan Amount</th>
                        <th>Application Date</th>
                        <th>Status</th>
                        <th>Notes</th>
                        <th>Action</th>
                    </tr>

                    <tr>
                        <td>User 1</td>
                        <td>$200,000</td>
                        <td>2024-01-01</td>
                        <td><span class="badge pending">Pending</span></td>
                        <td>-</td>
                        <td>
                            <button class="btn approve">Approve</button>
                            <button class="btn reject">Reject</button>
                        </td>
                    </tr>

                    <tr>
                        <td>User 2</td>
                        <td>$150,000</td>
                        <td>2024-01-02</td>
                        <td><span class="badge approved">Approved</span></td>
                        <td>Verified</td>
                        <td>
                            <button class="btn reject">Reject</button>
                        </td>
                    </tr>

                    <tr>
                        <td>User 3</td>
                        <td>$300,000</td>
                        <td>2024-01-03</td>
                        <td><span class="badge rejected">Rejected</span></td>
                        <td>Low credit</td>
                        <td>
                            <button class="btn approve">Approve</button>
                        </td>
                    </tr>

                </table>

                <!-- Pagination -->
                <div class="pagination">
                    <span>1</span>
                    <span>2</span>
                    <span>3</span>
                    <span>Next</span>
                </div>

            </div>

        </div>

    </div>

</body>

</html>
