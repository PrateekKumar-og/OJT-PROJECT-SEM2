<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            background: #f4f6f8;
        }

        .sidebar {
            width: 180px;
            background: #2c3e50;
            color: white;
            padding: 15px;
            height: 100vh;
        }

        .sidebar div {
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 5px;
            cursor: pointer;
        }

        .sidebar div:hover {
            background: #34495e;
        }

        .main {
            flex: 1;
            padding: 20px;
        }

        h2 {
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .card {
            display: inline-block;
            background: white;
            padding: 15px;
            margin-right: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            min-width: 150px;
        }

        .card p {
            margin: 0;
            color: #666;
        }

        .card b {
            display: block;
            margin-top: 5px;
            font-size: 18px;
            color: #2c3e50;
        }

        button {
            margin-top: 15px;
            margin-right: 10px;
            padding: 10px 18px;
            border: none;
            border-radius: 5px;
            background: #3498db;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }

        .bar {
            width: 100%;
            height: 12px;
            background: #ddd;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }

        .fill {
            width: 40%;
            height: 100%;
            background: #27ae60;
        }

        table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background: #3498db;
            color: white;
            text-align: left;
            padding: 10px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f2f2f2;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div>Dashboard</div>
        <div>Apply Loan</div>
        <div>Repayment</div>
        <div>Transactions</div>
        <div>Support</div>
    </div>

    <div class="main">
        <h2>Hi, User</h2>

        <div class="card">
            <p>Total Loan</p>
            <b>$13M</b>
        </div>

        <div class="card">
            <p>EMI Due</p>
            <b>$6</b>
        </div>

        <div class="card">
            <p>Next Payment</p>
            <b>$1</b>
        </div>

        <br><br>

        <button>Apply Loan</button>
        <button>Pay EMI</button>

        <h3>Repayment Progress</h3>
        <div class="bar">
            <div class="fill"></div>
        </div>

        <h3>Transactions</h3>

        <table>
            <tr>
                <th>Date</th>
                <th>ID</th>
                <th>Amount</th>
                <th>Status</th>
            </tr>

            <tr>
                <td>1</td>
                <td>001</td>
                <td>$120000</td>
                <td>$1500</td>
            </tr>

            <tr>
                <td>2</td>
                <td>002</td>
                <td>$15000</td>
                <td>$1200</td>
            </tr>

        </table>
    </div>

</body>

</html>
